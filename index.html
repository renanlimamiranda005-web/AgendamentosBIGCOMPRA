<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Big Compra - Sistema de Reserva</title>
    <meta name="description" content="Sistema de gestão de reservas Big Compra">
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#FF6B00">
    <!-- FAVICON -->
    <link rel="icon" type="image/png" href="https://i.ibb.co/27tf8sTz/image.png">
    <link rel="preconnect" href="https://script.google.com"> 
    <link rel="dns-prefetch" href="https://script.google.com">

    <style>
        html, body {
            margin: 0;
            padding: 0;
            height: 100%;
            overflow: hidden;
            background: #0a0a0a;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        .loading-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            color: white;
            text-align: center;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: linear-gradient(135deg, #0a0a0a 0%, #1a1a1a 100%);
            z-index: 9999;
            transition: opacity 0.4s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .loading-container.hidden {
            opacity: 0;
            pointer-events: none;
        }

        .particles {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
        }

        .particle {
            position: absolute;
            width: 3px;
            height: 3px;
            background: #FF6B00;
            border-radius: 50%;
            animation: particleMove 1.8s linear infinite;
            opacity: 0;
        }

        @keyframes particleMove {
            0% {
                transform: translateY(100vh) translateX(0);
                opacity: 0;
            }
            10% { opacity: 0.8; }
            90% { opacity: 0.8; }
            100% {
                transform: translateY(-100px) translateX(20px);
                opacity: 0;
            }
        }

        .logo-container {
            margin-bottom: 30px;
            position: relative;
            width: 180px;
            height: 180px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .logo-image {
            width: 100%;
            height: 100%;
            border-radius: 50%;
            object-fit: cover;
            box-shadow: 0 0 40px rgba(255, 107, 0, 0.6);
            animation: logoPulse 1.2s ease-in-out infinite alternate;
            position: relative;
            z-index: 2;
        }

        @keyframes logoPulse {
            0% {
                transform: scale(1);
                box-shadow: 0 0 30px rgba(255, 107, 0, 0.6);
            }
            100% {
                transform: scale(1.08);
                box-shadow: 0 0 50px rgba(255, 107, 0, 0.8);
            }
        }

        .ring {
            position: absolute;
            top: -15px;
            left: -15px;
            right: -15px;
            bottom: -15px;
            border: 2px solid rgba(255, 107, 0, 0.3);
            border-radius: 50%;
            border-top-color: #FF6B00;
            border-right-color: #FF8C00;
            border-bottom-color: #FF6B00;
            border-left-color: #FF8C00;
            animation: spin 1.5s linear infinite;
            z-index: 1;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .loading-text {
            font-size: 32px;
            font-weight: 800;
            margin-bottom: 10px;
            background: linear-gradient(45deg, #FF6B00, #FF8C00, #FF6B00);
            background-size: 200% auto;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            animation: gradientText 3s ease infinite;
        }

        @keyframes gradientText {
            0%, 100% { background-position: 0% center; }
            50% { background-position: 100% center; }
        }

        .loading-subtext {
            font-size: 14px;
            opacity: 0.8;
            margin-bottom: 40px;
            max-width: 300px;
            line-height: 1.5;
        }

        .progress-container {
            width: 280px;
            margin-bottom: 30px;
        }

        .progress-bar-bg {
            width: 100%;
            height: 4px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 10px;
            overflow: hidden;
            position: relative;
        }

        .progress-bar-fill {
            height: 100%;
            width: 0%;
            background: linear-gradient(90deg, #FF6B00, #FF8C00, #FF6B00);
            background-size: 200% 100%;
            border-radius: 10px;
            transition: width 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            position: relative;
            animation: gradientMove 2s ease infinite;
        }

        @keyframes gradientMove {
            0%, 100% { background-position: 0% center; }
            50% { background-position: 100% center; }
        }

        .progress-bar-fill::after {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: linear-gradient(90deg,
                transparent,
                rgba(255, 255, 255, 0.3),
                transparent);
            animation: shine 1.5s ease-in-out infinite;
        }

        @keyframes shine {
            0% { transform: translateX(-100%); }
            100% { transform: translateX(100%); }
        }

        .progress-info {
            display: flex;
            justify-content: space-between;
            margin-top: 8px;
            font-size: 12px;
            opacity: 0.7;
        }

        .status-dots {
            display: flex;
            gap: 8px;
            margin-top: 20px;
        }

        .dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.3);
            animation: dotPulse 1.4s ease-in-out infinite;
        }

        .dot:nth-child(2) { animation-delay: 0.2s; }
        .dot:nth-child(3) { animation-delay: 0.4s; }

        @keyframes dotPulse {
            0%, 60%, 100% {
                transform: scale(1);
                opacity: 0.3;
            }
            30% {
                transform: scale(1.3);
                opacity: 1;
                background: #FF8C00;
            }
        }

        iframe {
            border: none;
            width: 100%;
            height: 100%;
            position: fixed;
            top: 0;
            left: 0;
            z-index: 1;
            opacity: 0;
            transition: opacity 0.4s cubic-bezier(0.4, 0, 0.2, 1);
        }

        iframe.loaded {
            opacity: 1;
        }

        .performance-warning {
            position: fixed;
            bottom: 10px;
            right: 10px;
            background: rgba(255, 69, 0, 0.1);
            color: #FF4500;
            padding: 6px 12px;
            border-radius: 4px;
            font-size: 11px;
            display: none;
            z-index: 10000;
        }
    </style>

</head>
<body>

    <div class="loading-container" id="loading">
        <div class="particles" id="particles"></div>

        <div class="logo-container">
            <img class="logo-image" src="https://i.ibb.co/v4yLxdKZ/Whats-App-Image-2026-03-07-at-12-16-05.jpg" alt="Big Compra Logo">
            <div class="ring"></div>
        </div>

        <div class="loading-text">Big Compra</div>
        <div class="loading-subtext">Sistema de Gestão de Reservas</div>

        <div class="progress-container">
            <div class="progress-bar-bg">
                <div class="progress-bar-fill" id="progressBar"></div>
            </div>
            <div class="progress-info">
                <span id="progressText">Iniciando...</span>
                <span id="progressPercent">0%</span>
            </div>
        </div>

        <div class="status-dots">
            <div class="dot"></div>
            <div class="dot"></div>
            <div class="dot"></div>
        </div>
    </div>

    <div class="performance-warning" id="perfWarning">
        Conexão lenta detectada
    </div>

    <iframe
        src="about:blank"
        id="appFrame"
        allow="camera; microphone; fullscreen"
        sandbox="allow-same-origin allow-scripts allow-forms allow-popups allow-modals">
    </iframe>

    <iframe id="preloader" style="display: none;"></iframe>

    <script>

        // ============================================
        // CONFIGURAÇÕES PRINCIPAIS
        // ============================================

        const APP_URL = "https://script.google.com/macros/s/AKfycby7le0ozhst4PkK2sXb218hXK9yjkduSz5Xxa02dT5A2GN3zAY-JKeUJDS8VP2U3PBc/exec";

        const LOAD_TIMEOUT = 5000;
        const QUICK_LOAD_TIMEOUT = 2500;

        const loading = document.getElementById('loading');
        const appFrame = document.getElementById('appFrame');
        const progressBar = document.getElementById('progressBar');
        const progressText = document.getElementById('progressText');
        const progressPercent = document.getElementById('progressPercent');
        const perfWarning = document.getElementById('perfWarning');
        const particlesContainer = document.getElementById('particles');

        let loadingStartTime = Date.now();
        let isLoaded = false;
        let connectionType = 'unknown';
        let progressInterval;

        function detectConnection() {
            if ('connection' in navigator) {
                const conn = navigator.connection;
                connectionType = conn.effectiveType;

                if (conn.saveData || connectionType.includes('2g') || connectionType.includes('slow-2g')) {
                    perfWarning.style.display = 'block';
                    return 'slow';
                } else if (connectionType.includes('3g')) {
                    return 'moderate';
                } else {
                    return 'fast';
                }
            }
            return 'unknown';
        }

        function createParticles() {
            const connectionSpeed = detectConnection();
            const particleCount = connectionSpeed === 'slow' ? 8 : 12;

            for (let i = 0; i < particleCount; i++) {
                const particle = document.createElement('div');
                particle.className = 'particle';

                particle.style.left = `${Math.random() * 100}%`;
                particle.style.top = '100vh';
                particle.style.animationDelay = `${Math.random() * 2}s`;
                particle.style.animationDuration = `${1 + Math.random() * 1.5}s`;

                const size = Math.random() * 4 + 2;
                particle.style.width = `${size}px`;
                particle.style.height = `${size}px`;
                particle.style.opacity = Math.random() * 0.5 + 0.3;

                particlesContainer.appendChild(particle);
            }
        }

        function simulateSmartProgress() {

            const connectionSpeed = detectConnection();
            let progress = 0;
            let targetProgress = 85;

            const speedConfig = {
                'slow': { interval: 80, increment: 1.5 },
                'moderate': { interval: 60, increment: 2 },
                'fast': { interval: 40, increment: 3 },
                'unknown': { interval: 50, increment: 2.5 }
            };

            const config = speedConfig[connectionSpeed] || speedConfig.unknown;

            clearInterval(progressInterval);

            progressInterval = setInterval(() => {

                if (progress < targetProgress) {

                    progress += config.increment;
                    if (progress > targetProgress) progress = targetProgress;

                    updateProgress(progress);

                    if (progress < 30) {
                        progressText.textContent = "Inicializando...";
                    } else if (progress < 60) {
                        progressText.textContent = "Conectando...";
                    } else {
                        progressText.textContent = "Carregando aplicação...";
                    }
                }

            }, config.interval);
        }

        function updateProgress(percent) {
            progressBar.style.width = `${percent}%`;
            progressPercent.textContent = `${Math.round(percent)}%`;
        }

        function startPreload() {
            setTimeout(() => {
                appFrame.src = APP_URL;
            }, 300);
        }

        function onIframeLoad() {

            if (isLoaded) return;

            isLoaded = true;

            clearInterval(progressInterval);
            updateProgress(100);
            progressText.textContent = "Pronto!";

            setTimeout(() => {

                loading.classList.add('hidden');

                setTimeout(() => {
                    appFrame.classList.add('loaded');
                    loading.style.display = 'none';
                }, 400);

            }, 300);
        }

        function setupTimeout() {

            const timeout = connectionType.includes('fast') ? QUICK_LOAD_TIMEOUT : LOAD_TIMEOUT;

            setTimeout(() => {

                if (!isLoaded) {

                    clearInterval(progressInterval);
                    updateProgress(95);
                    progressText.textContent = "Concluindo...";

                    setTimeout(() => {
                        loading.classList.add('hidden');
                        appFrame.classList.add('loaded');
                        loading.style.display = 'none';
                    }, 500);

                }

            }, timeout);
        }

        function monitorPerformance() {
            if ('performance' in window) {

                const checkLoad = setInterval(() => {

                    if (isLoaded) {
                        clearInterval(checkLoad);
                    }

                }, 100);
            }
        }

        function init() {

            loadingStartTime = Date.now();

            detectConnection();
            createParticles();
            simulateSmartProgress();
            startPreload();
            setupTimeout();
            monitorPerformance();

            appFrame.addEventListener('load', onIframeLoad);

            appFrame.addEventListener('error', () => {
                progressText.textContent = "Erro de conexão...";
                setTimeout(onIframeLoad, 1000);
            });
        }

        function registerServiceWorker() {

            if ('serviceWorker' in navigator) {

                setTimeout(() => {

                    navigator.serviceWorker.register('./sw.js')
                        .catch(() => {});

                }, 3000);
            }
        }

        document.addEventListener('DOMContentLoaded', () => {
            init();
            registerServiceWorker();
        });

        if (document.readyState === 'interactive' || document.readyState === 'complete') {
            init();
            registerServiceWorker();
        }

    </script>

</body>
</html>
